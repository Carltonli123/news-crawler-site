name: Hourly News Scraper

on:
  schedule:
    # This runs the scraper at the start of every hour (UTC time)
    - cron: '0 * * * *'
  workflow_dispatch:
    # This enables a manual "Run" button so you can test it immediately without waiting an hour

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code onto GitHub's cloud runner
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Set up the Node.js runtime environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-with-version: '20'
          cache: 'npm'

      # 3. Install the dependencies listed in your package.json (axios, cheerio, pg)
      - name: Install dependencies
        run: npm install

      # 4. Execute the scraper script, securely injecting your database secret
      - name: Run Scraper Script
        run: node scraper.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
